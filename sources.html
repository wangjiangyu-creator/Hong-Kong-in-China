<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>资料库｜香港与中国式现代化研究门户</title>
  <meta name="description" content="按法律法规、政策文件讲话、学术理论、制度分析、政策报告、重大事件和新闻整理香港与中国式现代化研究资料。">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body data-base="">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <strong>香港与中国式现代化</strong>
        <span>国际制度能力研究门户</span>
      </a>
      <nav class="main-nav" aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="sources.html" aria-current="page">资料库</a>
        <a href="comparison.html">比较矩阵</a>
        <a href="timeline.html">时间线</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="page-title">
        <p class="eyebrow">Evidence Library</p>
        <h1>资料库</h1>
        <p class="lead">资料库以“权威来源优先”为标准：官方法律政策、特区文件、权威报告和核心学术文献为主，新闻材料主要用于标注事件节点。每条资料都标明类型、日期、发布者、用途和链接。</p>
        <div class="library-stats" aria-label="资料库统计">
          <div><strong data-library-stat="total">0</strong><span>资料条目</span></div>
          <div><strong data-library-stat="english">0</strong><span>英文资料</span></div>
          <div><strong data-library-stat="journal">0</strong><span>学术期刊</span></div>
          <div><strong data-library-stat="policy">0</strong><span>政策报告</span></div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-inner">
        <div class="section-heading">
          <div>
            <h2>按类型筛选</h2>
            <p>可切换查看法律法规、政策文件讲话、学术理论、制度分析、政策报告、重大事件和新闻。</p>
          </div>
        </div>
        <div class="library-tools">
          <label class="source-search">
            <span>检索资料</span>
            <input type="search" data-source-search placeholder="输入关键词、机构、标签或主题">
          </label>
          <div class="result-count" data-source-result-count>正在载入资料…</div>
        </div>
        <div class="filters" data-source-filters></div>
        <div class="source-grid" data-source-list="all"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div>
        <div>香港与中国式现代化研究门户 · <span data-year></span></div>
        <p class="footer-note">本网站由香港城市大学法律学院王江雨教授为个人研究目的使用Codex创建。</p>
      </div>
      <div><a href="index.html">首页</a> · <a href="comparison.html">比较矩阵</a> · <a href="timeline.html">时间线</a></div>
    </div>
  </footer>
  <script src="assets/data.js"></script>
  <script src="assets/site.js"></script>
</body>
</html>
