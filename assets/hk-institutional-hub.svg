<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" role="img" aria-labelledby="title desc">
  <title id="title">香港国际制度枢纽示意图</title>
  <desc id="desc">图中以香港为中心，连接国家战略、国际规则、资本市场、专业服务和风险缓冲五个制度能力方向。</desc>
  <rect width="900" height="680" fill="#f4f7f8"/>
  <path d="M90 110h720v460H90z" fill="#ffffff" stroke="#d9e0e6" stroke-width="2" rx="8"/>
  <path d="M190 540c110-86 190-125 305-118 95 6 150 49 238 12" fill="none" stroke="#d9e0e6" stroke-width="5"/>
  <path d="M156 194c88 52 185 74 292 66 116-8 214-49 296-120" fill="none" stroke="#d9e0e6" stroke-width="4"/>
  <circle cx="450" cy="340" r="102" fill="#0d6b64"/>
  <circle cx="450" cy="340" r="78" fill="#ffffff" opacity="0.13"/>
  <text x="450" y="322" text-anchor="middle" font-family="Arial, PingFang SC, sans-serif" font-size="40" font-weight="700" fill="#ffffff">香港</text>
  <text x="450" y="365" text-anchor="middle" font-family="Arial, PingFang SC, sans-serif" font-size="21" fill="#ffffff">国际制度枢纽</text>
  <g font-family="Arial, PingFang SC, sans-serif" font-size="20" font-weight="700">
    <g>
      <line x1="450" y1="238" x2="450" y2="118" stroke="#b6423c" stroke-width="6" stroke-linecap="round"/>
      <circle cx="450" cy="94" r="58" fill="#b6423c"/>
      <text x="450" y="89" text-anchor="middle" fill="#ffffff">一国</text>
      <text x="450" y="116" text-anchor="middle" fill="#ffffff" font-size="15">战略纵深</text>
    </g>
    <g>
      <line x1="532" y1="280" x2="704" y2="174" stroke="#315f8c" stroke-width="6" stroke-linecap="round"/>
      <circle cx="752" cy="146" r="70" fill="#315f8c"/>
      <text x="752" y="139" text-anchor="middle" fill="#ffffff">国际规则</text>
      <text x="752" y="167" text-anchor="middle" fill="#ffffff" font-size="15">普通法与仲裁</text>
    </g>
    <g>
      <line x1="552" y1="369" x2="712" y2="452" stroke="#b6842d" stroke-width="6" stroke-linecap="round"/>
      <circle cx="762" cy="478" r="70" fill="#b6842d"/>
      <text x="762" y="471" text-anchor="middle" fill="#ffffff">资本市场</text>
      <text x="762" y="499" text-anchor="middle" fill="#ffffff" font-size="15">离岸人民币</text>
    </g>
    <g>
      <line x1="368" y1="401" x2="205" y2="504" stroke="#376f43" stroke-width="6" stroke-linecap="round"/>
      <circle cx="150" cy="540" r="70" fill="#376f43"/>
      <text x="150" y="533" text-anchor="middle" fill="#ffffff">专业服务</text>
      <text x="150" y="561" text-anchor="middle" fill="#ffffff" font-size="15">会计合规咨询</text>
    </g>
    <g>
      <line x1="358" y1="276" x2="190" y2="164" stroke="#5f6670" stroke-width="6" stroke-linecap="round"/>
      <circle cx="142" cy="132" r="70" fill="#5f6670"/>
      <text x="142" y="125" text-anchor="middle" fill="#ffffff">风险缓冲</text>
      <text x="142" y="153" text-anchor="middle" fill="#ffffff" font-size="15">争端解决</text>
    </g>
  </g>
  <g font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#17202a">
    <rect x="306" y="585" width="288" height="46" fill="#edf4f2" stroke="#d9e0e6" rx="8"/>
    <text x="450" y="614" text-anchor="middle" font-weight="700">以“一国”固本，以“两制”通世</text>
  </g>
</svg>
